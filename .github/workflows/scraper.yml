name: Travel Tracker — Scrape & Alert

on:
  schedule:
    # 7:00 AM CT (13:00 UTC) — morning run
    - cron: "0 13 * * *"
    # 7:00 PM CT (01:00 UTC next day) — evening run
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes, no email)"
        type: boolean
        default: false

jobs:
  # ── Job 1: Americas Hotels (Hawaii + Miami + Cancun) ─────────────────────
  scrape-hotels-americas:
    name: Hotels — Americas
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 libxcomposite1 \
            libxdamage1 libxfixes3 libxkbcommon0 libxrandr2 xvfb

      - name: Install Python deps and Chromium
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run hotel scraper — Americas
        env:
          SUPABASE_DB_URL:     ${{ secrets.SUPABASE_DB_URL }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          NOTIFY_FROM_EMAIL:   ${{ secrets.NOTIFY_FROM_EMAIL }}
          NOTIFY_TO_EMAIL:     ${{ secrets.NOTIFY_TO_EMAIL }}
          TRIP_FILTER: "Hawaii — Maui,Hawaii — Oahu,Miami,Cancun"
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          python scrapers/hotel_scraper.py ${DRY:+--dry-run}

  # ── Job 2: Europe + Asia Hotels ───────────────────────────────────────────
  scrape-hotels-intl:
    name: Hotels — Europe + Asia
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 libxcomposite1 \
            libxdamage1 libxfixes3 libxkbcommon0 libxrandr2 xvfb

      - name: Install Python deps and Chromium
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run hotel scraper — Europe + Asia
        env:
          SUPABASE_DB_URL:     ${{ secrets.SUPABASE_DB_URL }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          NOTIFY_FROM_EMAIL:   ${{ secrets.NOTIFY_FROM_EMAIL }}
          NOTIFY_TO_EMAIL:     ${{ secrets.NOTIFY_TO_EMAIL }}
          TRIP_FILTER:         "Europe — Paris,Europe — London,Europe — Barcelona + Rome,Asia — Tokyo,Asia — Singapore + Bangkok,Bali,Dubai,Bali Retreat"
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          python scrapers/hotel_scraper.py ${DRY:+--dry-run}

  # ── Job 3: Flights ────────────────────────────────────────────────────────
  scrape-flights:
    name: Flight Price Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             libasound2t64 libatk1.0-0 libatk-bridge2.0-0 libcups2             libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 libxcomposite1             libxdamage1 libxfixes3 libxkbcommon0 libxrandr2 xvfb

      - name: Install Python deps and Chromium
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run flight scraper
        env:
          SUPABASE_DB_URL:     ${{ secrets.SUPABASE_DB_URL }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          NOTIFY_FROM_EMAIL:   ${{ secrets.NOTIFY_FROM_EMAIL }}
          NOTIFY_TO_EMAIL:     ${{ secrets.NOTIFY_TO_EMAIL }}
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          python scrapers/flight_scraper.py ${DRY:+--dry-run}

  # ── Job 4: Alert Engine ───────────────────────────────────────────────────
  send-alerts:
    name: Alert Engine
    runs-on: ubuntu-latest
    needs: [scrape-hotels-americas, scrape-hotels-intl, scrape-flights]
    if: always() && (
      needs.scrape-hotels-americas.result == 'success' ||
      needs.scrape-hotels-intl.result == 'success' ||
      needs.scrape-flights.result == 'success'
      )

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert engine
        env:
          SUPABASE_DB_URL:     ${{ secrets.SUPABASE_DB_URL }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          NOTIFY_FROM_EMAIL:   ${{ secrets.NOTIFY_FROM_EMAIL }}
          NOTIFY_TO_EMAIL:     ${{ secrets.NOTIFY_TO_EMAIL }}
          ALERT_PCT_DROP:      "10"
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          python alerts/alert_engine.py ${DRY:+--dry-run}

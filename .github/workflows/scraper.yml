name: Travel Tracker — Scrape & Alert

on:
  schedule:
    # 7:00 AM CT (13:00 UTC) — morning run
    - cron: "0 13 * * *"
    # 7:00 PM CT (01:00 UTC next day) — evening run
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes, no email)"
        type: boolean
        default: false
      scraper:
        description: "Which scraper to run"
        type: choice
        options:
          - both
          - hotels
          - flights
        default: both

jobs:
  # ── Job 1: Hotel Scraper ──────────────────────────────────────────────────
  scrape-hotels:
    name: Hotel Price Scraper
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.scraper == 'both' || github.event.inputs.scraper == 'hotels'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run hotel scraper
        env:
          SUPABASE_DB_URL:    ${{ secrets.SUPABASE_DB_URL }}
          AZURE_TENANT_ID:    ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:    ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          NOTIFY_FROM_EMAIL:  ${{ secrets.NOTIFY_FROM_EMAIL }}
          NOTIFY_TO_EMAIL:    ${{ secrets.NOTIFY_TO_EMAIL }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scrapers/hotel_scraper.py --dry-run
          else
            python scrapers/hotel_scraper.py
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hotel-scraper-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7

  # ── Job 2: Flight Scraper ─────────────────────────────────────────────────
  scrape-flights:
    name: Flight Price Scraper
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.scraper == 'both' || github.event.inputs.scraper == 'flights'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run flight scraper
        env:
          SUPABASE_DB_URL:    ${{ secrets.SUPABASE_DB_URL }}
          AZURE_TENANT_ID:    ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:    ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          NOTIFY_FROM_EMAIL:  ${{ secrets.NOTIFY_FROM_EMAIL }}
          NOTIFY_TO_EMAIL:    ${{ secrets.NOTIFY_TO_EMAIL }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scrapers/flight_scraper.py --dry-run
          else
            python scrapers/flight_scraper.py
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flight-scraper-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7

  # ── Job 3: Alert Engine ───────────────────────────────────────────────────
  # Runs after BOTH scrapers complete (regardless of which failed)
  send-alerts:
    name: Alert Engine
    runs-on: ubuntu-latest
    needs: [scrape-hotels, scrape-flights]
    if: >
      always() &&
      (needs.scrape-hotels.result == 'success' || needs.scrape-flights.result == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert engine
        env:
          SUPABASE_DB_URL:     ${{ secrets.SUPABASE_DB_URL }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          NOTIFY_FROM_EMAIL:   ${{ secrets.NOTIFY_FROM_EMAIL }}
          NOTIFY_TO_EMAIL:     ${{ secrets.NOTIFY_TO_EMAIL }}
          ALERT_PCT_DROP:      "10"
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python alerts/alert_engine.py --dry-run
          else
            python alerts/alert_engine.py
          fi
